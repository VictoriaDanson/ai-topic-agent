<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI选题Agent</title>
    <style>
      body {
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
        background: #f5f5f5;
        margin: 0;
      }
      
      /* Markdown 样式 */
      .markdown-body {
        font-size: 14px;
        line-height: 1.8;
        color: #333;
      }
      
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.25;
        color: #1a1a1a;
      }
      
      .markdown-body h1 {
        font-size: 2em;
        border-bottom: 1px solid #eee;
        padding-bottom: 0.3em;
      }
      
      .markdown-body h2 {
        font-size: 1.5em;
        border-bottom: 1px solid #eee;
        padding-bottom: 0.3em;
      }
      
      .markdown-body h3 {
        font-size: 1.25em;
      }
      
      .markdown-body p {
        margin-top: 0;
        margin-bottom: 16px;
      }
      
      .markdown-body ul,
      .markdown-body ol {
        padding-left: 2em;
        margin-top: 0;
        margin-bottom: 16px;
      }
      
      .markdown-body li {
        margin-bottom: 8px;
      }
      
      .markdown-body code {
        padding: 0.2em 0.4em;
        margin: 0;
        font-size: 85%;
        background-color: rgba(175, 184, 193, 0.2);
        border-radius: 6px;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
      }
      
      .markdown-body pre {
        padding: 16px;
        overflow: auto;
        font-size: 85%;
        line-height: 1.45;
        background-color: #f6f8fa;
        border-radius: 6px;
        margin-bottom: 16px;
      }
      
      .markdown-body pre code {
        display: inline;
        padding: 0;
        margin: 0;
        overflow: visible;
        line-height: inherit;
        background-color: transparent;
        border: 0;
      }
      
      .markdown-body blockquote {
        padding: 0 1em;
        color: #57606a;
        border-left: 0.25em solid #d0d7de;
        margin: 0 0 16px 0;
      }
      
      .markdown-body table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 16px;
      }
      
      .markdown-body table th,
      .markdown-body table td {
        padding: 6px 13px;
        border: 1px solid #d0d7de;
      }
      
      .markdown-body table th {
        font-weight: 600;
        background-color: #f6f8fa;
      }
      
      .markdown-body table tr:nth-child(2n) {
        background-color: #f6f8fa;
      }
      
      .markdown-body strong {
        font-weight: 600;
      }
      
      .markdown-body em {
        font-style: italic;
      }
      
      .markdown-body a {
        color: #0969da;
        text-decoration: none;
      }
      
      .markdown-body a:hover {
        text-decoration: underline;
      }
      
      .markdown-body hr {
        height: 0.25em;
        padding: 0;
        margin: 24px 0;
        background-color: #d0d7de;
        border: 0;
      }
    </style>
  </head>
  <body>
    <h1>金融选题Agent</h1>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
